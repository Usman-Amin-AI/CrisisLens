version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisislens-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - db

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: crisislens-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - api

  db:
    image: postgres:14-alpine
    container_name: crisislens-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crisislens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crisislens}
      POSTGRES_DB: ${POSTGRES_DB:-crisislens}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
